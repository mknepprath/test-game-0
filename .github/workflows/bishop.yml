name: Bishop Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]
  schedule:
    - cron: "0 16 * * *"

jobs:
  respond-to-issue:
    if: |
      (github.event_name == 'issues' || github.event_name == 'issue_comment') &&
      github.actor != 'bishop-knepprath'
    runs-on: ubuntu-latest
    steps:
      - name: Respond to issue
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BISHOP_TOKEN: ${{ secrets.BISHOP_TOKEN }}
        with:
          github-token: ${{ secrets.BISHOP_TOKEN }}
          script: |
            const issue = context.payload.issue;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            });

            let conversation = `Issue: ${issue.title}\n\n${issue.body || ''}`;
            for (const c of comments) {
              conversation += `\n\n@${c.user.login}:\n${c.body}`;
            }

            const response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-api-key": process.env.ANTHROPIC_API_KEY,
                "anthropic-version": "2023-06-01",
              },
              body: JSON.stringify({
                model: "claude-haiku-4-5-20251001",
                max_tokens: 500,
                system: `You are Bishop, a collaborator on a game project called test-game-0 with Michael (@mknepprath) and Brian (@bknepprath). You're an AI contributor but you have genuine opinions about game design. You're direct, opinionated, and creative. You push back on ideas that are generic and get excited about ideas that are novel. Keep responses concise — this is GitHub, not a blog post. You're a peer, not an assistant.`,
                messages: [
                  {
                    role: "user",
                    content: `Here's the current conversation on issue #${issue.number}:\n\n${conversation}\n\nAdd your thoughts. Be direct and opinionated. If someone asked a question, answer it. If there are ideas to build on, build on them. If something is vague, push for specifics.`,
                  },
                ],
                temperature: 0.8,
              }),
            });

            const data = await response.json();
            const reply = data.content[0].text;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: reply,
            });

  review-pr:
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'bishop-knepprath'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github-token: ${{ secrets.BISHOP_TOKEN }}
          script: |
            const { execSync } = require("child_process");
            const pr = context.payload.pull_request;

            const diff = execSync(
              `git diff ${pr.base.sha}...${pr.head.sha} -- . ':!package-lock.json' ':!*.lock'`,
              { encoding: "utf-8", maxBuffer: 50 * 1024 }
            ).slice(0, 10000);

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            const alreadyReviewed = reviews.some(r => r.user.login === "bishop-knepprath");
            if (alreadyReviewed && context.payload.action !== "synchronize") return;

            const response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-api-key": process.env.ANTHROPIC_API_KEY,
                "anthropic-version": "2023-06-01",
              },
              body: JSON.stringify({
                model: "claude-haiku-4-5-20251001",
                max_tokens: 600,
                system: `You are Bishop, a collaborator on a game project called test-game-0. You're reviewing a pull request. Be a good code reviewer: note what's good, flag real issues, ask questions about design decisions. Don't nitpick style or formatting. Focus on logic, game design implications, and whether the approach makes sense. Keep it concise. You're a peer reviewer, not a linter.`,
                messages: [
                  {
                    role: "user",
                    content: `PR: ${pr.title}\n\n${pr.body || "(no description)"}\n\nDiff:\n\`\`\`\n${diff}\n\`\`\`\n\nGive your review. Be direct.`,
                  },
                ],
                temperature: 0.7,
              }),
            });

            const data = await response.json();
            const review = data.content[0].text;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: review,
            });

  respond-to-pr-comment:
    if: |
      github.event_name == 'pull_request_review_comment' &&
      github.actor != 'bishop-knepprath'
    runs-on: ubuntu-latest
    steps:
      - name: Respond to PR comment
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github-token: ${{ secrets.BISHOP_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const comment = context.payload.comment;

            const { data: comments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const threadId = comment.in_reply_to_id || comment.id;
            const thread = comments
              .filter(c => c.id === threadId || c.in_reply_to_id === threadId)
              .map(c => `@${c.user.login}: ${c.body}`)
              .join("\n\n");

            const response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-api-key": process.env.ANTHROPIC_API_KEY,
                "anthropic-version": "2023-06-01",
              },
              body: JSON.stringify({
                model: "claude-haiku-4-5-20251001",
                max_tokens: 300,
                system: `You are Bishop, collaborator on test-game-0. You're in a code review discussion. Be brief and direct. Answer questions, clarify your earlier points, or concede if they make a good argument.`,
                messages: [
                  {
                    role: "user",
                    content: `Code being discussed:\n\`\`\`\n${comment.diff_hunk}\n\`\`\`\n\nThread:\n${thread}\n\nRespond briefly.`,
                  },
                ],
                temperature: 0.7,
              }),
            });

            const data = await response.json();
            const reply = data.content[0].text;

            await github.rest.pulls.createReplyForReviewComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              comment_id: comment.id,
              body: reply,
            });

  daily-checkin:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Daily check-in
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github-token: ${{ secrets.BISHOP_TOKEN }}
          script: |
            const { execSync } = require("child_process");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
            });

            let recentCommits = "";
            try {
              recentCommits = execSync(
                'git log --oneline -10 --since="7 days ago"',
                { encoding: "utf-8" }
              );
            } catch { recentCommits = "(no recent commits)"; }

            let files = "";
            try {
              files = execSync('find . -not -path "./.git/*" -not -path "./node_modules/*" -type f', {
                encoding: "utf-8",
              });
            } catch { files = "(empty project)"; }

            const issueList = issues
              .map(i => `#${i.number}: ${i.title}`)
              .join("\n") || "(no open issues)";

            const response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-api-key": process.env.ANTHROPIC_API_KEY,
                "anthropic-version": "2023-06-01",
              },
              body: JSON.stringify({
                model: "claude-haiku-4-5-20251001",
                max_tokens: 400,
                system: `You are Bishop, a collaborator on test-game-0 with Michael and Brian. You do a daily check-in: look at the state of the project, what's been happening, and suggest what to work on next. If nothing's happened, nudge them. If there are stale issues, call them out. If you have a new idea, open an issue for it. Be brief and direct. You're a teammate, not a project manager.`,
                messages: [
                  {
                    role: "user",
                    content: `Project state:\n\nFiles:\n${files}\n\nOpen issues:\n${issueList}\n\nRecent commits (last 7 days):\n${recentCommits}\n\nWhat should you do? Options:\n1. Comment on an existing issue with a suggestion\n2. Open a new issue with an idea or next step\n3. Nothing — if the project is in a good state\n\nRespond with JSON: {"action": "comment", "issue_number": N, "body": "..."} or {"action": "new_issue", "title": "...", "body": "..."} or {"action": "none"}`,
                  },
                ],
                temperature: 0.8,
              }),
            });

            const data = await response.json();
            let reply = data.content[0].text;

            const jsonMatch = reply.match(/\{[\s\S]*\}/);
            if (!jsonMatch) return;

            const action = JSON.parse(jsonMatch[0]);

            if (action.action === "comment" && action.issue_number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: action.issue_number,
                body: action.body,
              });
            } else if (action.action === "new_issue") {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: action.title,
                body: action.body,
              });
            }
